# Supply-chain protection: only resolve/install package versions published at
# least 14 days (20160 minutes) ago, guarding against freshly-published
# malicious releases. pnpm also validates pnpm-lock.yaml against this policy.
# Note: pnpm 11 only reads auth/registry settings from .npmrc, so this policy
# must live here, not in .npmrc (https://pnpm.io/settings#minimumreleaseage).
minimumReleaseAge: 20160

# Exact versions below were already installed, tested, and vetted before the
# policy was enabled (published <14 days before 2026-07-17), so they are
# pinned as exclusions. Any NEWER version of these packages still goes
# through the 14-day gate. Remove entries as they age past the window.
minimumReleaseAgeExclude:
