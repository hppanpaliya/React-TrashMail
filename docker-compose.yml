version: "3.8"

services:
  app:
    image: hppanpaliya/react-trashmail:latest
    # For local development you can uncomment the build section below
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=${DB_NAME:-myemails}
      - PORT=4000
      - TRUST_PROXY=${TRUST_PROXY:-1}
    volumes:
      - ./mailserver/attachments:/React-TrashMail/mailserver/attachments
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${DB_NAME:-myemails}

volumes:
  mongo_data:
