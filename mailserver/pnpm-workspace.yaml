# pnpm settings (pnpm >= 11 reads settings from this file, not .npmrc/package.json).

# Pin htmlparser2 to 9.1.0 under sanitize-html ONLY (converted from the yarn
# "resolutions" field). sanitize-html 2.17.x declares htmlparser2 ^12, which is
# ESM-only and cannot be require()d from this CommonJS app. html-to-text keeps
# its own htmlparser2 version.
overrides:
  "sanitize-html>htmlparser2": "9.1.0"

# Supply-chain safety: only install package versions published at least 14 days
# (20160 minutes) ago, giving the ecosystem time to catch malicious releases.
minimumReleaseAge: 20160

# Grandfathered exceptions: these exact versions were already in use before the
# pnpm migration (carried over from yarn.lock) but were published within the
# 14-day window at migration time (2026-07-17). Exclusions are version-scoped,
# so newer versions of these packages remain subject to the policy. The newest
# entry was published 2026-07-16, so this whole list can be deleted after
# 2026-07-31.
minimumReleaseAgeExclude:
  - "@sinclair/typebox@0.34.52"
  - "@types/node@26.1.1"
  - "@ungap/structured-clone@1.3.3"
  - "@zone-eu/mailsplit@5.4.14"
  - "bare-fs@4.7.4"
  - "bare-path@3.1.1"
  - "baseline-browser-mapping@2.10.43"
  - "brace-expansion@1.1.16"
  - "brace-expansion@2.1.2"
  - "browserslist@4.28.6"
  - "caniuse-lite@1.0.30001806"
  - "electron-to-chromium@1.5.392"
  - "express-rate-limit@8.6.0"
  - "helmet@8.3.0"
  - "libmime@5.4.1"
  - "mailparser@3.9.14"
  - "mongodb-connection-string-url@7.0.2"
  - "mongodb@7.5.0"
  - "nanoid@3.3.16"
  - "node-cron@4.6.0"
  - "node-mocks-http@1.18.1"
  - "node-releases@2.0.51"
  - "postcss@8.5.19"
  - "prettier@3.9.5"
  - "sanitize-html@2.17.6"
  - "smtp-server@3.19.2"

# Dependency build scripts (pnpm blocks postinstall scripts by default).
# bcrypt: native addon, must compile/install its binding.
# mongodb-memory-server: postinstall downloads the mongod binary used in tests.
# unrs-resolver: not needed; ships prebuilt platform binaries as optionalDependencies.
allowBuilds:
  bcrypt: true
  mongodb-memory-server: true
  unrs-resolver: false
